<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Blog - Contato</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="topo">
    <h1 class="logo">Luís Rissardo - Blog </h1>
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="about.html">Sobre Mim</a>
      <a href="curriculum.html">Currículo</a>
      <a href="receitas.html">Receitas</a>
      <a href="contact.html">Contato</a>
    </nav>
    <div class="ferramentas">
      <button id="btnDark" class="btnFerr">Modo</button>
      <button id="btnMenos" class="btnFerr">A-</button>
      <button id="btnMais" class="btnFerr">A+</button>
    </div>
  </header>

  <main>
    <h2 class="tituloSect">Contato</h2>
    <p>Quer falar comigo? Preencha o formulário abaixo:</p>

    <form id="formContato" class="formContato">
      <label for="nome">Nome:</label>
      <input type="text" id="nome" name="nome" required>

      <label for="email">E-mail:</label>
      <input type="email" id="email" name="email" required>

      <label for="msg">Mensagem:</label>
      <textarea id="msg" name="msg" rows="5" required></textarea>

      <button type="submit" class="btnEnviar">Enviar</button>
    </form>
  </main>

  <footer class="rodape">
    <p>&copy; 2025 - Blog do Luisão. Todos os direitos reservados para mim.</p>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
